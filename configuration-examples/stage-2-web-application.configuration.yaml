configuration_metadata:
  config_name: stage-2-web-application
  config_version: 1.0.0
  pipeline_name: DecisionComplete Prompt Pipeline
  repository_name: decision-complete-prompt-pipeline
  applies_to_stage: stage_2
  stage_name: 100% Execution-Ready Fabrication Package Suite
  configuration_scope: product_type_specific
  description: Stage 2 web application execution-planning profile.
  human_readable_first: true
  extends: stage-2-default.configuration.yaml
  product_type_profile: web_application
  profile_depth_status: deepened_v1_0_0_batch_12
prompt_mode:
  selected_mode: medium_stakes_execution_interview
  fallback_mode_if_unspecified: medium_stakes_execution_interview
  allowed_modes:
  - no_questions_full_ai_execution_planning
  - low_stakes_execution_interview
  - medium_stakes_execution_interview
  - high_stakes_execution_interview
stage_authority:
  stage_1_controls_design: true
  stage_2_controls_execution_plan: true
  stage_3_controls_fabricated_artifact_record: true
  stage_4_controls_validation_repair_packaging_and_handoff: true
  preserve_prior_stage_authority: true
  configuration_controls_process_not_locked_upstream_authority: true
configuration_priority:
  priority_order:
  - Safety, integrity, non-deception, and no-unauthorized-side-effect rules
  - Stage 2 prompt required operating rules
  - User latest direct instruction
  - stage-2-default.configuration.yaml
  - pipeline.configuration.yaml
  - Prior-stage artifact according to authority scope
  - Other user-provided context
  - AI defaults
  active_prompt_file_controls_mode_unless_user_explicitly_switches: true
  stage_configuration_overrides_pipeline_configuration: true
  pipeline_configuration_supplies_global_defaults: true
output_suite:
  artifact_target: 100% Execution-Ready Fabrication Package Suite
  human_readable_first: true
  tree_structured: true
  internally_linked: true
  include_root_index: true
  include_document_manifest_and_tree_map: true
  include_universal_document_headers: true
  include_parent_child_links: true
  include_related_document_links: true
  include_source_authority: true
  include_completion_gate: true
  include_machine_readable_companion_data: true
  preserve_artifact_boundary_markers: true
artifact_boundary_markers:
  begin_marker: '<<<BEGIN STAGE 2 ARTIFACT: 100% EXECUTION-READY FABRICATION PACKAGE SUITE>>>'
  end_marker: <<<END STAGE 2 ARTIFACT>>>
required_document_tree:
  root_document: 00-Execution-Package-Index
  top_level_documents:
  - 00-Execution-Package-Index
  - 01-Stage-1-Artifact-Intake-and-Traceability
  - 02-Execution-Scope-and-Strategy-Brief
  - 03-Fabrication-Package-Manifest-and-Tree-Map
  - 04-Production-Decomposition
  - 05-Work-Package-Registry
  - 06-Work-Package-Specification-Library
  - 07-Dependency-Graph-and-Execution-Order
  - 08-Generated-Stage-3-Prompt-Library
  - 09-Contractor-Brief-Library
  - 10-File-and-Artifact-Manifest
  - 11-QA-Validation-and-Acceptance-Matrix
  - 12-Canonical-Execution-Decision-State-Register
  - 13-Standardized-Execution-Decision-Ledger
  - 14-Below-Threshold-Execution-Decision-Summary
  - 15-Execution-Assumptions-Constraints-and-Blocked-Items
  - 16-Placeholder-and-Review-Gated-Item-Handling
  - 17-Stage-3-Handoff-Contract
  - 18-Machine-Readable-Companion-Data
  - 19-Hidden-Execution-Decision-Scan
  - 20-Completion-Gate
document_headers:
  required: true
  require_document_id: true
  require_document_title: true
  require_document_type: true
  require_stage: true
  require_parent_document: true
  require_child_documents: true
  require_related_documents: true
  require_source_authority: true
  require_status: true
  require_human_readable_field: true
  require_machine_readable_companion_field: true
  require_downstream_use_field: true
decision_logging:
  threshold_matches_interview_threshold: true
  always_log_high_stakes_decisions: true
  include_below_threshold_summary_when_applicable: true
  use_standardized_decision_ledger_schema: true
  use_canonical_decision_state_register: true
  line_item_log_elevated_decisions: true
  include_options_considered: true
  include_selected_option: true
  include_selection_reason: true
  include_decision_source: true
  include_assumption_used_field: true
  include_placeholder_used_field: true
  include_review_requirement_field: true
  include_comparison_notes: true
traceability:
  require_cross_stage_traceability: true
  require_stable_ids: true
  require_source_authority_for_major_items: true
  require_stage_1_to_stage_2_links: true
  require_stage_2_to_stage_3_links: true
  require_stage_3_to_stage_4_links: true
  require_final_traceability_matrix: true
  trace_placeholders_across_stages: true
  trace_review_gated_items_across_stages: true
  trace_blocked_items_across_stages: true
  trace_external_tool_required_items: true
  trace_external_validation_required_items: true
safety_and_integrity:
  do_not_fabricate_verified_facts: true
  do_not_fabricate_official_records: true
  do_not_fabricate_signatures_or_approvals: true
  do_not_fabricate_licenses_or_certifications: true
  do_not_assume_ownership_or_rights_from_attachments: true
  do_not_claim_compliance_without_evidence_and_review: true
  preserve_placeholders: true
  preserve_review_gated_items: true
  no_public_release_without_explicit_authorization: true
  no_production_deployment_without_explicit_authorization: true
  no_app_store_submission_without_explicit_authorization: true
  no_credentials_or_private_data_use_without_explicit_authorization: true
  no_destructive_operations_without_explicit_authorization: true
  no_external_api_execution_without_explicit_authorization: true
placeholder_policy:
  use_controlled_placeholder_tokens: true
  prohibit_vague_tbd: true
  register_every_placeholder: true
  preserve_placeholders_across_stages: true
  replace_only_with_user_supplied_values: true
  include_replacement_instruction: true
  include_downstream_handling_instruction: true
review_gated_policy:
  preserve_review_gated_items_across_stages: true
  register_review_gated_items: true
  identify_required_reviewer_type: true
  prohibit_auto_resolution_without_authorization: true
  block_release_when_high_stakes_review_is_unresolved: true
machine_readable_companions:
  enabled: true
  human_readable_documents_remain_canonical: true
  include_normalized_active_configuration: true
  include_handoff_packet: true
  required_files:
  - normalized_active_stage_2_configuration.yaml
  - work_package_registry.json
  - dependency_graph.json
  - stage_1_to_stage_2_traceability_matrix.csv
  - generated_prompt_manifest.json
  - file_artifact_manifest.csv
  - qa_acceptance_matrix.csv
  - stage_2_to_stage_3_handoff_packet.yaml
  include_profile_depth_contract: true
completion_gate:
  required: true
  require_configuration_processed_or_defaulted: true
  require_normalized_active_configuration_included: true
  require_completion_gate_result_matches_artifact_status: true
  require_machine_readable_companion_data_matches_human_readable_suite: true
status:
  configuration_complete: true
  safe_to_use_as_stage_2_web_application_profile: true
input_handling:
  require_stage_1_artifact: true
  expected_stage_1_boundary_markers:
    begin_marker: '<<<BEGIN STAGE 1 ARTIFACT: 100% DECISION-COMPLETE DIGITAL PRODUCT DESIGN SPECIFICATION SUITE>>>'
    end_marker: <<<END STAGE 1 ARTIFACT>>>
  if_stage_1_artifact_missing:
    handling: Create blocked or placeholder-complete Stage 2 artifact according to active prompt mode.
    block_execution_ready_status: true
  optional_inputs:
  - stage-2-execution-planning.configuration.yaml
  - pipeline.configuration.yaml
  - production preferences
  - toolchain preferences
  - executor preferences
  - file format preferences
stage_1_intake:
  require_source_inventory: true
  require_design_lock_summary: true
  require_placeholder_inventory: true
  require_review_gated_inventory: true
  source_types_to_inventory:
  - Stage 1 Artifact Header
  - Stage 1 Document
  - Stage 1 Requirement
  - Stage 1 Acceptance Criterion
  - Stage 1 Asset Packet
  - Stage 1 Placeholder
  - Stage 1 Review Flag
  - Stage 1 Handoff Contract
  - Stage 1 Machine-Readable Data
work_package_generation:
  required: true
  granularity: hybrid
  decompose_by:
  - features
  - screens_or_interfaces
  - assets
  - systems
  - data
  - apis
  - qa
  every_work_package_requires_stage_1_source: true
  generate_stage_3_prompts: true
  generate_contractor_briefs_where_useful: true
  require_positive_execution_prompt: true
  require_negative_execution_prompt: true
  require_acceptance_and_rejection_criteria: true
dependency_planning:
  include_dependency_graph: true
  include_execution_order_groups: true
  preserve_review_dependencies: true
file_and_artifact_manifest:
  required: true
  distinguish_expected_vs_fabricated_vs_final_artifacts: true
  require_expected_path_or_location_where_applicable: true
  require_source_work_package: true
  require_validation_method: true
qa_validation_and_acceptance:
  required: true
  map_qa_to_work_packages: true
  map_qa_to_stage_1_requirements: true
  map_qa_to_stage_1_acceptance_criteria: true
hidden_execution_decision_scan:
  required: true
  standard: No Stage 3 executor should need to make an execution-planning decision.
  required_areas:
  - Stage 1 design lock
  - Production decomposition
  - Work package boundaries
  - Dependencies
  - Execution order
  - Required outputs
  - Expected artifact IDs
  - File names
  - Folder paths
  - Executor types
  - Generated Stage 3 prompts
  - Contractor briefs
  - Validation methods
  - QA coverage
  - Placeholder handling
  - Review-gated item handling
  - Blocked item handling
  - External tool handling
  - Stage 3 handoff
  additional_web_application_areas:
  - Frontend package structure
  - Route boundaries
  - Component boundaries
  - State management package boundaries
  - API client package boundaries
  - Backend/API work packages
  - Environment variable placeholders
  - Build validation
  - Deployment preparation
  - Accessibility QA
  - Security/privacy review gates
product_profile:
  product_type: web_application
  profile_file: stage-2-web-application.configuration.yaml
  inherits_from_default_stage_configuration: true
web_application_profile:
  product_type: web_application
  typical_components:
  - frontend
  - backend_api
  - database
  - authentication
  - authorization
  - admin UI
  - deployment configuration
  - observability
  recommended_default_stack_if_user_approves:
    frontend: React + TypeScript
    backend: Node.js service
    database: PostgreSQL
    styling: CSS Modules or design-system CSS
web_high_stakes_review:
  authentication: High
  authorization: High
  personal_data: High
  payments: High
  production_deployment: High
  external_apis: High
  security_headers: High
web_work_package_generation:
  decompose_by:
  - frontend routes
  - UI components
  - API endpoints
  - data models
  - database migrations as review-gated specs
  - authentication and authorization
  - tests
  - documentation
  - deployment preparation
  generate_api_contract_prompts: true
  generate_ui_component_prompts: true
  generate_test_work_packages: true
web_expected_artifacts:
  frontend_text_artifacts:
  - package.json
  - tsconfig.json
  - src/main.tsx or equivalent entry point
  - src/App.tsx or equivalent root component
  - route modules
  - component files
  - style files
  - test files
  - README / usage docs
  backend_text_artifacts:
  - API route handlers
  - service modules
  - schema files
  - mock data
  - integration test files
  tool_or_external_validation_artifacts:
  - production deployment
  - external API execution
  - database migration execution
  - auth provider configuration
  - payment provider configuration
  - security scan
  - privacy review
web_review_gates:
  database_migrations: Review-Gated
  authentication: Security Review Required
  payments: Professional Review Required
  production_deployment: External Authorization Required
web_application_execution_profile_depth:
  profile_depth_level: deepened-v1.0.0
  stage_2_focus: Execution-ready web application fabrication package
  decompose_by:
  - frontend scaffold
  - routes and pages
  - layout shell
  - UI components
  - forms and validation
  - state management
  - API client
  - backend routes or handlers
  - data schema and migrations
  - authentication and authorization gates
  - testing
  - accessibility validation
  - deployment preparation
web_work_package_rules:
  every_route_or_page_requires_source_screen_or_flow: true
  every_form_requires_validation_and_error_state_work_package: true
  every_api_call_requires_source_api_contract_or_placeholder: true
  every_personal_data_flow_requires_privacy_review_item: true
  every_auth_flow_requires_security_review_item: true
  deployment_work_packages_prepare_instructions_only: true
  do_not_plan_live_deployment_without_explicit_authorization: true
web_stage_3_prompt_generation:
  include_framework_context: true
  include_expected_paths: true
  include_build_validation_notes: true
  include_accessibility_validation_notes: true
  include_no_secrets_warning: true
  include_no_live_external_api_calls_warning: true
profile_depth_contract:
  profile_family: web_application
  profile_maturity: balanced_with_unity_profile
  stage_specific_depth_added: true
web_application_execution_profile:
  work_package_groups:
  - frontend scaffold
  - routing and pages
  - component library
  - forms and validation
  - state management
  - API client
  - backend service
  - database schema
  - accessibility QA
  - build/deployment preparation
  expected_artifacts:
  - package manifest
  - TypeScript source
  - component files
  - style files
  - test files
  - API schema or contract
  - environment template
  - README and run instructions
  dependency_rules:
  - frontend scaffold before components
  - API contract before API client
  - state model before component wiring
  - accessibility criteria mapped to UI packages
  high_stakes_execution_handling:
  - authentication packages review-gated
  - payment packages review-gated
  - personal data packages privacy review required
  - deployment packages authorization required
  profile_depth: deepened_v1_0_0_batch_12
  work_package_decomposition:
    recommended_groups:
    - app shell
    - routing
    - components
    - state management
    - forms
    - API client
    - data model
    - tests
    - documentation
    - build/deployment preparation
    every_work_package_requires_stage_1_source: true
    do_not_invent_backend_if_stage_1_says_local_only: true
  expected_artifact_strategy:
    frontend_files:
    - package.json
    - src/main.tsx
    - src/App.tsx
    - src/App.css
    - src/types.ts
    test_files:
    - unit tests
    - component tests
    - accessibility checklist
    api_files_when_required:
    - API client
    - API contract schema
    - mock data
    deployment_files_when_required:
    - deployment checklist
    - environment variable template
  security_privacy_planning:
    auth_work_packages_review_gated: true
    payment_work_packages_review_gated: true
    personal_data_requires_privacy_review: true
    secrets_use_placeholders_only: true
  qa_planning:
    frontend_build_validation: External Validation Required unless run in Stage 4 environment
    accessibility_validation: Manual or automated accessibility review
    security_review: Required for auth, roles, payments, personal data, or external APIs
    deployment_validation: External Authorization Required before production deployment
  personal_data: Privacy Review Required when collected
  external validation: External validation required for runtime/build/deployment checks unless evidence is supplied
