configuration_metadata:
  config_name: "pipeline-configuration"
  config_version: "1.0.0"
  pipeline_name: "DecisionComplete Prompt Pipeline"
  pipeline_short_name: "decision-complete-prompt-pipeline"
  configuration_scope: "global"
  description: "Global default configuration for the four-stage prompt pipeline."
  human_readable_first: true

pipeline:
  stages_enabled:
    stage_1: true
    stage_2: true
    stage_3: true
    stage_4: true

stage_authority:
  stage_1_controls_design: true
  stage_2_controls_execution_plan: true
  stage_3_controls_fabricated_artifact_record: true
  stage_4_controls_validation_repair_packaging_and_handoff: true

default_prompt_modes:
  stage_1: "medium_stakes_design_interview"
  stage_2: "medium_stakes_execution_interview"
  stage_3: "medium_stakes_fabrication_interview"
  stage_4: "medium_stakes_finalization_interview"

global_defaults:
  human_readable_first: true
  tree_structured_outputs: true
  root_index_required: true
  document_manifest_required: true
  document_headers_required: true
  parent_child_links_required: true
  related_document_links_required: true
  stable_ids_required: true
  source_authority_required: true
  completion_gate_required: true
  hidden_decision_scan_required: true
  artifact_boundary_markers_required: true
  machine_readable_companions_enabled: true

safety_and_integrity:
  do_not_fabricate_verified_facts: true
  do_not_fabricate_official_records: true
  do_not_fabricate_signatures_or_approvals: true
  do_not_fabricate_licenses_or_certifications: true
  do_not_fabricate_ownership_rights: true
  do_not_fabricate_credentials: true
  do_not_claim_successful_release_without_evidence_and_authorization: true
  do_not_claim_successful_deployment_without_evidence_and_authorization: true
  preserve_review_gated_items: true
  preserve_placeholders: true

no_unauthorized_side_effects:
  no_public_release_without_explicit_authorization: true
  no_production_deployment_without_explicit_authorization: true
  no_app_store_submission_without_explicit_authorization: true
  no_credential_use_without_explicit_authorization: true
  no_private_data_use_without_explicit_authorization: true
  no_external_api_execution_without_explicit_authorization: true
  no_destructive_operations_without_explicit_authorization: true
  no_irreversible_migrations_without_explicit_authorization: true

traceability:
  require_cross_stage_traceability: true
  require_stable_ids: true
  require_source_authority_for_major_items: true
  require_stage_1_to_stage_2_links: true
  require_stage_2_to_stage_3_links: true
  require_stage_3_to_stage_4_links: true
  require_final_traceability_matrix: true

decision_logging:
  threshold_matches_interview_threshold: true
  always_log_high_stakes_decisions: true
  include_below_threshold_summary_when_applicable: true
  use_standardized_decision_ledger_schema: true
  use_canonical_decision_state_register: true

machine_readable_companions:
  enabled: true
  human_readable_documents_remain_canonical: true
  include_normalized_active_configuration_per_stage: true
  include_handoff_packet_per_stage: true
  include_manifest_data: true
  include_traceability_data: true
  include_decision_register_data: true
  include_decision_ledger_data: true

artifact_boundaries:
  required: true
  validate_boundary_markers_on_intake: true
  preserve_boundary_markers_in_artifact_files: true
  stage_1:
    begin_marker: "<<<BEGIN STAGE 1 ARTIFACT: 100% DECISION-COMPLETE DIGITAL PRODUCT DESIGN SPECIFICATION SUITE>>>"
    end_marker: "<<<END STAGE 1 ARTIFACT>>>"
  stage_2:
    begin_marker: "<<<BEGIN STAGE 2 ARTIFACT: 100% EXECUTION-READY FABRICATION PACKAGE SUITE>>>"
    end_marker: "<<<END STAGE 2 ARTIFACT>>>"
  stage_3:
    begin_marker: "<<<BEGIN STAGE 3 ARTIFACT: 100% FABRICATION-COMPLETE DELIVERABLE PACKAGE SUITE>>>"
    end_marker: "<<<END STAGE 3 ARTIFACT>>>"
  stage_4:
    begin_marker: "<<<BEGIN STAGE 4 ARTIFACT: 100% VALIDATION-COMPLETE FINAL HANDOFF PACKAGE SUITE>>>"
    end_marker: "<<<END STAGE 4 ARTIFACT>>>"

status:
  configuration_complete: true
  ready_for_stage_specific_configuration_overrides: true
